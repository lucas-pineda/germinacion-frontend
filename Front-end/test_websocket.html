<!DOCTYPE html>
<html>
<head>
    <title>WebSocket Test</title>
</head>
<body>
    <h1>WebSocket Real-Time Test</h1>
    <div id="messages" style="border:1px solid #ccc; padding:10px; height:300px; overflow-y:auto;"></div>
    <button onclick="sendPing()">Send Ping</button>
    
    <script>
        const ws = new WebSocket("ws://localhost:8000/ws");
        const messagesDiv = document.getElementById("messages");
        
        ws.onopen = () => {
            console.log("✓ WebSocket conectado");
            addMessage("✓ Conectado al servidor");
        };
        
        ws.onmessage = (event) => {
            console.log("Mensaje recibido:", event.data);
            const data = JSON.parse(event.data);
            addMessage(`📨 ${JSON.stringify(data, null, 2)}`);
        };
        
        ws.onerror = (error) => {
            console.error("❌ WebSocket error:", error);
            addMessage("❌ Error de conexión");
        };
        
        ws.onclose = () => {
            console.log("WebSocket cerrado");
            addMessage("❌ Desconectado");
        };
        
        function sendPing() {
            ws.send(JSON.stringify({"type": "ping"}));
            addMessage("📤 Ping enviado");
        }
        
        function addMessage(msg) {
            const p = document.createElement("p");
            p.textContent = new Date().toLocaleTimeString() + ": " + msg;
            messagesDiv.appendChild(p);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
    </script>
</body>
</html>
